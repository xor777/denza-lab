---
- name: Install relay host dependencies
  ansible.builtin.apt:
    name:
      - libpam-modules
      - openssh-client
      - procps
      - util-linux
      - acl
    state: present

- name: Create the relay state group
  ansible.builtin.group:
    name: "{{ relay_host_state_group }}"
    system: true
    state: present

- name: Create the relay admin web group
  ansible.builtin.group:
    name: "{{ relay_host_web_user }}"
    system: true
    state: present

- name: Create the locked relay admin web account
  ansible.builtin.user:
    name: "{{ relay_host_web_user }}"
    group: "{{ relay_host_web_user }}"
    groups: []
    append: false
    home: /var/lib/cag-web
    shell: /usr/sbin/nologin
    system: true
    create_home: false
    password_lock: true

- name: Create service-account groups
  ansible.builtin.group:
    name: "{{ item }}"
    system: true
    state: present
  loop: "{{ relay_host_service_accounts }}"

- name: Create locked service accounts
  ansible.builtin.user:
    name: "{{ item }}"
    group: "{{ item }}"
    groups: "{{ [relay_host_state_group] if item in relay_host_state_accounts else [] }}"
    append: false
    home: "/var/lib/{{ item }}"
    shell: /bin/bash
    system: true
    create_home: true
    password_lock: "{{ item not in relay_host_pam_accounts }}"
  loop: "{{ relay_host_service_accounts }}"

- name: Give PAM-only accounts an unguessable unlocked shadow hash
  ansible.builtin.user:
    name: "{{ item }}"
    password: "{{ relay_host_pam_account_password_hash }}"
    password_lock: false
  loop: "{{ relay_host_pam_accounts }}"
  no_log: true

- name: Restrict service-account homes
  ansible.builtin.file:
    path: "/var/lib/{{ item }}"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0750"
  loop: "{{ relay_host_service_accounts }}"

- name: Create service-account SSH directories
  ansible.builtin.file:
    path: "/var/lib/{{ item }}/.ssh"
    state: directory
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0700"
  loop: "{{ relay_host_key_accounts }}"

- name: Create empty service-account authorized-key stores
  ansible.builtin.copy:
    dest: "/var/lib/{{ item }}/.ssh/authorized_keys"
    content: ""
    owner: "{{ item }}"
    group: "{{ item }}"
    mode: "0600"
    force: false
  loop: "{{ relay_host_key_accounts }}"

- name: Create relay state directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ relay_host_root }}"
      group: root
      mode: "0755"
    - path: "{{ relay_host_root }}/state"
      group: "{{ relay_host_state_group }}"
      mode: "2770"
    - path: "{{ relay_host_root }}/state/locks"
      group: "{{ relay_host_state_group }}"
      mode: "2770"
  loop_control:
    label: "{{ item.path }}"

- name: Create the atomic relay state
  ansible.builtin.copy:
    dest: "{{ relay_host_root }}/state/state.json"
    content: >-
      {"clients":{},"codes":{},"devices":{},"grants":{},"next_port":20000,"pending":{},"version":3}
    owner: root
    group: "{{ relay_host_state_group }}"
    mode: "0660"
    force: false

- name: Create the relay state lock
  ansible.builtin.file:
    path: "{{ relay_host_root }}/state/locks/state.lock"
    state: touch
    owner: root
    group: "{{ relay_host_state_group }}"
    mode: "0660"
    modification_time: preserve
    access_time: preserve

- name: Install the relay state engine
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../platform/relay/cag_state.py"
    dest: "{{ relay_host_root }}/cag-state"
    owner: root
    group: root
    mode: "0755"

- name: Install the relay admin web application
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../platform/relay/cag_web.py"
    dest: "{{ relay_host_root }}/cag-web"
    owner: root
    group: root
    mode: "0755"
  notify: Restart relay admin web

- name: Install relay command wrappers
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../platform/relay/{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0755"
  loop:
    - src: check-code.sh
      dest: "{{ relay_host_root }}/check-code.sh"
    - src: enroll.sh
      dest: "{{ relay_host_root }}/enroll.sh"
    - src: pair-client.sh
      dest: "{{ relay_host_root }}/pair-client.sh"
    - src: device-control.sh
      dest: "{{ relay_host_root }}/device-control.sh"
    - src: authorized-keys.sh
      dest: "{{ relay_host_root }}/authorized-keys.sh"
    - src: cag-admin
      dest: /usr/local/sbin/cag-admin
  loop_control:
    label: "{{ item.dest }}"

- name: Migrate and validate relay state schema
  ansible.builtin.command: "{{ relay_host_root }}/cag-state migrate"
  changed_when: false

- name: Grant the authorized-keys reader directory traversal
  ansible.posix.acl:
    path: "{{ item }}"
    entity: cag-authkeys
    etype: user
    permissions: r-x
    state: present
  loop:
    - "{{ relay_host_root }}/state"
    - "{{ relay_host_root }}/state/locks"

- name: Preserve authorized-keys read access across atomic replacements
  ansible.posix.acl:
    path: "{{ item }}"
    entity: cag-authkeys
    etype: user
    permissions: r-x
    default: true
    state: present
  loop:
    - "{{ relay_host_root }}/state"
    - "{{ relay_host_root }}/state/locks"

- name: Grant the authorized-keys reader file access
  ansible.posix.acl:
    path: "{{ item }}"
    entity: cag-authkeys
    etype: user
    permissions: r--
    state: present
  loop:
    - "{{ relay_host_root }}/state/state.json"
    - "{{ relay_host_root }}/state/locks/state.lock"

- name: Apply lifecycle cleanup after schema migration
  ansible.builtin.command: /usr/local/sbin/cag-admin gc
  changed_when: false

- name: Install the relay admin web sudo policy
  ansible.builtin.template:
    src: cag-web.sudoers.j2
    dest: /etc/sudoers.d/cag-web
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  notify: Restart relay admin web

- name: Install the relay admin web service
  ansible.builtin.template:
    src: cag-web.service.j2
    dest: /etc/systemd/system/cag-web.service
    owner: root
    group: root
    mode: "0644"
  register: relay_host_web_unit
  notify: Restart relay admin web

- name: Enable the loopback-only relay admin web service
  ansible.builtin.systemd_service:
    name: cag-web.service
    enabled: true
    state: started
    daemon_reload: "{{ relay_host_web_unit.changed }}"

- name: Inspect retired TSV state files
  ansible.builtin.stat:
    path: "{{ relay_host_root }}/state/{{ item }}"
  loop:
    - devices.tsv
    - users.tsv
    - grants.tsv
  register: relay_host_legacy_tsv

- name: Refuse to delete non-empty retired TSV state
  ansible.builtin.assert:
    that:
      - not item.stat.exists or item.stat.size == 0
    fail_msg: "Refusing to delete non-empty legacy state file {{ item.item }}"
  loop: "{{ relay_host_legacy_tsv.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Remove empty retired TSV state files
  ansible.builtin.file:
    path: "{{ relay_host_root }}/state/{{ item.item }}"
    state: absent
  when: item.stat.exists
  loop: "{{ relay_host_legacy_tsv.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Install relay garbage-collection units
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/etc/systemd/system/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - src: cag-gc.service.j2
      dest: cag-gc.service
    - src: cag-gc.timer.j2
      dest: cag-gc.timer
  register: relay_host_gc_units

- name: Enable hourly relay garbage collection
  ansible.builtin.systemd_service:
    name: cag-gc.timer
    enabled: true
    state: started
    daemon_reload: "{{ relay_host_gc_units.changed }}"

- name: Authenticate invite and pairing codes before the system password stack
  ansible.builtin.blockinfile:
    path: /etc/pam.d/sshd
    marker: "# {mark} ANSIBLE MANAGED CAG CODE AUTH"
    insertbefore: '^@include common-auth'
    block: |
      auth [success=1 default=ignore] pam_exec.so expose_authtok quiet {{ relay_host_root }}/check-code.sh

- name: Enable network time synchronization
  ansible.builtin.service:
    name: systemd-timesyncd
    enabled: true
    state: started

- name: Allow relay SSH through UFW before opening the listener
  community.general.ufw:
    rule: allow
    port: "{{ relay_host_ssh_port | string }}"
    proto: tcp
    comment: CAG relay SSH

- name: Install relay SSH restrictions
  ansible.builtin.template:
    src: sshd-relay.conf.j2
    dest: /etc/ssh/sshd_config.d/20-ansible-cag-relay.conf
    owner: root
    group: root
    mode: "0644"
  notify: Validate and reload relay ssh
