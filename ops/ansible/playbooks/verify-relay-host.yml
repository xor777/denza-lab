---
- name: Verify the Car ADB Gateway relay host
  hosts: gateways
  become: true
  gather_facts: false

  tasks:
    - name: Read effective cag-device SSH settings
      ansible.builtin.command:
        argv:
          - /usr/sbin/sshd
          - -T
          - -C
          - user=cag-device,addr=127.0.0.1,host=localhost,lport={{ relay_host_ssh_port }}
      register: relay_verify_device_sshd
      changed_when: false

    - name: Read effective cag-client SSH settings
      ansible.builtin.command:
        argv:
          - /usr/sbin/sshd
          - -T
          - -C
          - user=cag-client,addr=127.0.0.1,host=localhost,lport={{ relay_host_ssh_port }}
      register: relay_verify_client_sshd
      changed_when: false

    - name: Read effective cag-enroll SSH settings
      ansible.builtin.command:
        argv:
          - /usr/sbin/sshd
          - -T
          - -C
          - user=cag-enroll,addr=127.0.0.1,host=localhost,lport={{ relay_host_ssh_port }}
      register: relay_verify_enroll_sshd
      changed_when: false

    - name: Read effective cag-pair SSH settings
      ansible.builtin.command:
        argv:
          - /usr/sbin/sshd
          - -T
          - -C
          - user=cag-pair,addr=127.0.0.1,host=localhost,lport={{ relay_host_ssh_port }}
      register: relay_verify_pair_sshd
      changed_when: false

    - name: Read effective cag-control SSH settings
      ansible.builtin.command:
        argv:
          - /usr/sbin/sshd
          - -T
          - -C
          - user=cag-control,addr=127.0.0.1,host=localhost,lport={{ relay_host_ssh_port }}
      register: relay_verify_control_sshd
      changed_when: false

    - name: Read effective admin-port settings for the admin account
      ansible.builtin.command:
        argv:
          - /usr/sbin/sshd
          - -T
          - -C
          - user={{ admin_user }},addr=127.0.0.1,host=localhost,lport={{ relay_host_admin_ssh_port }}
      register: relay_verify_admin_sshd
      changed_when: false

    - name: Read effective relay-port settings for the admin account
      ansible.builtin.command:
        argv:
          - /usr/sbin/sshd
          - -T
          - -C
          - user={{ admin_user }},addr=127.0.0.1,host=localhost,lport={{ relay_host_ssh_port }}
      register: relay_verify_admin_on_relay_sshd
      changed_when: false

    - name: Read effective admin-port settings for a relay account
      ansible.builtin.command:
        argv:
          - /usr/sbin/sshd
          - -T
          - -C
          - user=cag-device,addr=127.0.0.1,host=localhost,lport={{ relay_host_admin_ssh_port }}
      register: relay_verify_device_on_admin_sshd
      changed_when: false

    - name: Require direction-specific forwarding restrictions
      ansible.builtin.assert:
        that:
          - "'port 22' in relay_verify_device_sshd.stdout"
          - "'port 443' in relay_verify_device_sshd.stdout"
          - "'allowtcpforwarding remote' in relay_verify_device_sshd.stdout"
          - "'allowstreamlocalforwarding no' in relay_verify_device_sshd.stdout"
          - "'permitlisten 127.0.0.1:*' in relay_verify_device_sshd.stdout"
          - "'forcecommand /bin/false' in relay_verify_device_sshd.stdout"
          - "'allowtcpforwarding local' in relay_verify_client_sshd.stdout"
          - "'allowstreamlocalforwarding no' in relay_verify_client_sshd.stdout"
          - "'permitopen 127.0.0.1:*' in relay_verify_client_sshd.stdout"
          - "'forcecommand /bin/false' in relay_verify_client_sshd.stdout"
          - "'allowusers cag-device' in relay_verify_device_sshd.stdout"
          - "'allowusers cag-client' in relay_verify_device_sshd.stdout"
          - "'allowusers cag-enroll' in relay_verify_device_sshd.stdout"
          - "'allowusers cag-pair' in relay_verify_device_sshd.stdout"
          - "'allowusers cag-control' in relay_verify_device_sshd.stdout"
          - "'allowtcpforwarding no' in relay_verify_enroll_sshd.stdout"
          - "'passwordauthentication yes' in relay_verify_enroll_sshd.stdout"
          - "'forcecommand /opt/cag/enroll.sh' in relay_verify_enroll_sshd.stdout"
          - "'allowtcpforwarding no' in relay_verify_pair_sshd.stdout"
          - "'passwordauthentication yes' in relay_verify_pair_sshd.stdout"
          - "'forcecommand /opt/cag/pair-client.sh' in relay_verify_pair_sshd.stdout"
          - "'allowtcpforwarding no' in relay_verify_control_sshd.stdout"
          - "'pubkeyauthentication yes' in relay_verify_control_sshd.stdout"
          - "'authorizedkeyscommand /opt/cag/authorized-keys.sh %u' in relay_verify_control_sshd.stdout"
          - "'logingracetime 20' in relay_verify_device_sshd.stdout"
          - "'maxauthtries 3' in relay_verify_device_sshd.stdout"
          - "'maxstartups 30:30:100' in relay_verify_device_sshd.stdout"
          - "'persourcemaxstartups 10' in relay_verify_device_sshd.stdout"
          - "'persourcepenalties ' in relay_verify_device_sshd.stdout"
          - "'persourcepenalties no' not in relay_verify_device_sshd.stdout"
          - "('allowusers ' ~ admin_user) in relay_verify_admin_sshd.stdout"
          - "'allowusers cag-device' in relay_verify_admin_on_relay_sshd.stdout"
          - "'allowusers cag-client' in relay_verify_admin_on_relay_sshd.stdout"
          - "'allowusers cag-enroll' in relay_verify_admin_on_relay_sshd.stdout"
          - "'allowusers cag-pair' in relay_verify_admin_on_relay_sshd.stdout"
          - "'allowusers cag-control' in relay_verify_admin_on_relay_sshd.stdout"
          - "('allowusers ' ~ admin_user) in relay_verify_device_on_admin_sshd.stdout"

    - name: Verify relay control-plane files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /opt/cag/cag-state
        - /opt/cag/check-code.sh
        - /opt/cag/enroll.sh
        - /opt/cag/pair-client.sh
        - /opt/cag/device-control.sh
        - /opt/cag/authorized-keys.sh
        - /opt/cag/cag-web
        - /usr/local/sbin/cag-admin
      register: relay_verify_control_files

    - name: Require executable root-owned control-plane files
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isreg
          - item.stat.pw_name == 'root'
          - item.stat.executable
      loop: "{{ relay_verify_control_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read service-account password states
      ansible.builtin.command: "passwd -S {{ item }}"
      loop:
        - cag-device
        - cag-client
        - cag-enroll
        - cag-pair
        - cag-control
        - cag-authkeys
        - cag-web
      register: relay_verify_account_states
      changed_when: false

    - name: Require correct service-account password states
      ansible.builtin.assert:
        that:
          - >-
            (' P ' in item.stdout) if item.item in ['cag-enroll', 'cag-pair']
            else (' L ' in item.stdout)
      loop: "{{ relay_verify_account_states.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read authorized-keys reader groups
      ansible.builtin.command: id -nG cag-authkeys
      register: relay_verify_authkeys_groups
      changed_when: false

    - name: Require authorized-keys reader isolation from the writable state group
      ansible.builtin.assert:
        that:
          - "'cag-state' not in relay_verify_authkeys_groups.stdout.split()"

    - name: Read relay admin web account details
      ansible.builtin.getent:
        database: passwd
        key: cag-web

    - name: Require a non-login relay admin web account
      ansible.builtin.assert:
        that:
          - ansible_facts.getent_passwd['cag-web'][5] == '/usr/sbin/nologin'

    - name: Read relay admin web groups
      ansible.builtin.command: id -nG cag-web
      register: relay_verify_web_groups
      changed_when: false

    - name: Require relay admin web isolation from writable state
      ansible.builtin.assert:
        that:
          - "'cag-state' not in relay_verify_web_groups.stdout.split()"

    - name: Require relay admin web cannot write state directly
      become: true
      become_user: cag-web
      ansible.builtin.command:
        argv:
          - test
          - "!"
          - -w
          - "{{ item }}"
      loop:
        - /opt/cag/state/state.json
        - /opt/cag/state/locks/state.lock
      changed_when: false

    - name: Exercise the authorized-keys reader as its service account
      become: true
      become_user: cag-authkeys
      ansible.builtin.command: /opt/cag/cag-state authorized-keys cag-device
      changed_when: false

    - name: Require the authorized-keys reader cannot write state
      become: true
      become_user: cag-authkeys
      ansible.builtin.command:
        argv:
          - test
          - "!"
          - -w
          - "{{ item }}"
      loop:
        - /opt/cag/state/state.json
        - /opt/cag/state/locks/state.lock
      changed_when: false

    - name: Read relay state ACLs
      ansible.builtin.command:
        argv:
          - getfacl
          - -cp
          - "{{ item }}"
      loop:
        - /opt/cag/state
        - /opt/cag/state/locks
        - /opt/cag/state/state.json
        - /opt/cag/state/locks/state.lock
      register: relay_verify_state_acls
      changed_when: false

    - name: Require explicit authorized-keys read ACLs
      ansible.builtin.assert:
        that:
          - "'user:cag-authkeys:r' in item.stdout"
          - "'user:cag-authkeys:rw' not in item.stdout"
      loop: "{{ relay_verify_state_acls.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Run relay schema and invariant doctor
      ansible.builtin.command: /usr/local/sbin/cag-admin doctor
      register: relay_verify_doctor
      changed_when: false

    - name: Validate relay admin web sudo policy
      ansible.builtin.command: /usr/sbin/visudo -cf /etc/sudoers.d/cag-web
      changed_when: false

    - name: Exercise allowed relay admin web commands
      become: true
      become_user: cag-web
      ansible.builtin.command:
        argv:
          - /usr/bin/sudo
          - -n
          - /usr/local/sbin/cag-admin
          - "{{ item }}"
      loop:
        - list
        - doctor
      changed_when: false
      no_log: true

    - name: Attempt a forbidden relay admin web command
      become: true
      become_user: cag-web
      ansible.builtin.command:
        argv:
          - /usr/bin/sudo
          - -n
          - /usr/local/sbin/cag-admin
          - migrate
      register: relay_verify_web_denied_sudo
      changed_when: false
      failed_when: false

    - name: Require sudo denial outside the web command allow-list
      ansible.builtin.assert:
        that:
          - relay_verify_web_denied_sudo.rc != 0

    - name: Read relay admin web service state  # noqa command-instead-of-module
      ansible.builtin.command: "systemctl {{ item }} cag-web.service"
      loop:
        - is-active
        - is-enabled
      register: relay_verify_web_service
      changed_when: false

    - name: Require active and enabled relay admin web
      ansible.builtin.assert:
        that:
          - relay_verify_web_service.results[0].stdout == 'active'
          - relay_verify_web_service.results[1].stdout == 'enabled'

    - name: Read relay admin web hardening properties  # noqa command-instead-of-module
      ansible.builtin.command: >-
        systemctl show cag-web.service
        --property=User
        --property=Group
        --property=PrivateTmp
        --property=PrivateDevices
        --property=ProtectHome
        --property=ProtectSystem
        --property=ProtectKernelTunables
        --property=ProtectKernelModules
        --property=ProtectControlGroups
        --property=RestrictNamespaces
        --property=MemoryDenyWriteExecute
        --property=NoNewPrivileges
        --property=ReadWritePaths
      register: relay_verify_web_hardening
      changed_when: false

    - name: Require practical relay admin web hardening
      ansible.builtin.assert:
        that:
          - "'User=cag-web' in relay_verify_web_hardening.stdout"
          - "'Group=cag-web' in relay_verify_web_hardening.stdout"
          - "'PrivateTmp=yes' in relay_verify_web_hardening.stdout"
          - "'PrivateDevices=yes' in relay_verify_web_hardening.stdout"
          - "'ProtectHome=yes' in relay_verify_web_hardening.stdout"
          - "'ProtectSystem=strict' in relay_verify_web_hardening.stdout"
          - "'ProtectKernelTunables=yes' in relay_verify_web_hardening.stdout"
          - "'ProtectKernelModules=yes' in relay_verify_web_hardening.stdout"
          - "'ProtectControlGroups=yes' in relay_verify_web_hardening.stdout"
          - "'RestrictNamespaces=yes' in relay_verify_web_hardening.stdout"
          - "'MemoryDenyWriteExecute=yes' in relay_verify_web_hardening.stdout"
          - "'NoNewPrivileges=no' in relay_verify_web_hardening.stdout"
          - "'ReadWritePaths=/opt/cag/state' in relay_verify_web_hardening.stdout"

    - name: Check relay admin web health over loopback
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ relay_host_web_port }}/healthz"
        headers:
          Host: "127.0.0.1:{{ relay_host_web_port }}"
        return_content: true
        status_code: 200
      register: relay_verify_web_health

    - name: Require healthy relay admin web response
      ansible.builtin.assert:
        that:
          - relay_verify_web_health.json.ok | bool

    - name: Read relay garbage-collection timer state  # noqa command-instead-of-module
      ansible.builtin.command: "systemctl {{ item }} cag-gc.timer"
      loop:
        - is-active
        - is-enabled
      register: relay_verify_gc_timer
      changed_when: false

    - name: Require active and enabled lifecycle cleanup
      ansible.builtin.assert:
        that:
          - relay_verify_gc_timer.results[0].stdout == 'active'
          - relay_verify_gc_timer.results[1].stdout == 'enabled'

    - name: Read effective fail2ban SSH limits
      ansible.builtin.command: "fail2ban-client get sshd {{ item }}"
      loop:
        - maxretry
        - findtime
        - bantime
      register: relay_verify_fail2ban_limits
      changed_when: false

    - name: Require bounded SSH authentication retries
      ansible.builtin.assert:
        that:
          - relay_verify_fail2ban_limits.results[0].stdout | int == 5
          - relay_verify_fail2ban_limits.results[1].stdout | int == 600
          - relay_verify_fail2ban_limits.results[2].stdout | int == 900

    - name: Read listening TCP sockets
      ansible.builtin.command: ss -H -lnt
      register: relay_verify_sockets
      changed_when: false

    - name: Require admin and relay SSH listeners
      ansible.builtin.assert:
        that:
          - "':22 ' in relay_verify_sockets.stdout"
          - "':443 ' in relay_verify_sockets.stdout"
          - "('127.0.0.1:' ~ relay_host_web_port ~ ' ') in relay_verify_sockets.stdout"
          - "('0.0.0.0:' ~ relay_host_web_port ~ ' ') not in relay_verify_sockets.stdout"
          - "('[::]:' ~ relay_host_web_port ~ ' ') not in relay_verify_sockets.stdout"

    - name: Read dynamic client forwarding restrictions
      ansible.builtin.command: /opt/cag/cag-state authorized-keys cag-client
      register: relay_verify_client_authorized_keys
      changed_when: false
      no_log: true

    - name: Require application identities cannot reach relay admin web
      ansible.builtin.assert:
        that:
          - "('127.0.0.1:' ~ relay_host_web_port) not in relay_verify_client_authorized_keys.stdout"
      no_log: true

    - name: Read firewall status
      ansible.builtin.command: ufw status verbose
      register: relay_verify_ufw
      changed_when: false

    - name: Require relay port in the firewall
      ansible.builtin.assert:
        that:
          - "'443/tcp' in relay_verify_ufw.stdout"
          - "(relay_host_web_port | string) not in relay_verify_ufw.stdout"

    - name: Read time synchronization state
      ansible.builtin.command: timedatectl show --property=NTPSynchronized --value
      register: relay_verify_ntp
      changed_when: false

    - name: Require synchronized time for enrollment TTLs
      ansible.builtin.assert:
        that:
          - relay_verify_ntp.stdout == "yes"

    - name: Read relay host-key fingerprint
      ansible.builtin.command: >-
        ssh-keygen -lf /etc/ssh/ssh_host_ed25519_key.pub -E sha256
      register: relay_verify_host_key
      changed_when: false

    - name: Resolve the configured relay domain
      ansible.builtin.command: "getent ahostsv4 {{ relay_host_domain }}"
      register: relay_verify_dns
      changed_when: false
      failed_when: false

    - name: Require the pinned relay identity and DNS target
      ansible.builtin.assert:
        that:
          - relay_host_ed25519_fingerprint in relay_verify_host_key.stdout
          - relay_host_public_ipv4 in relay_verify_dns.stdout

    - name: Show relay verification summary
      ansible.builtin.debug:
        msg:
          domain: "{{ relay_host_domain }}"
          dns: "{{ relay_verify_dns.stdout_lines }}"
          enrollment_enabled: "{{ relay_host_enrollment_enabled }}"
          host_key: "{{ relay_verify_host_key.stdout }}"
          doctor: "{{ relay_verify_doctor.stdout }}"
          gc_timer: "{{ relay_verify_gc_timer.results | map(attribute='stdout') | list }}"
          web: "{{ relay_verify_web_service.results | map(attribute='stdout') | list }}"
          sockets: "{{ relay_verify_sockets.stdout_lines }}"
          ufw: "{{ relay_verify_ufw.stdout_lines }}"
