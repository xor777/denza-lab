---
- name: Prepare the Car ADB Gateway relay host
  hosts: gateways
  become: true
  gather_facts: true

  pre_tasks:
    - name: Require Ubuntu
      ansible.builtin.assert:
        that:
          - ansible_facts["distribution"] == "Ubuntu"
        fail_msg: "The relay-host role currently supports Ubuntu only."

  roles:
    - role: base
    - role: relay_host
